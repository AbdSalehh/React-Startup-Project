<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary SEO -->
    <title>React Capstone</title>
    <meta
      name="description"
      content="A modern React application built with Vite, TailwindCSS, and best practices."
    />
    <meta
      name="keywords"
      content="react, vite, tailwindcss, javascript, web app"
    />
    <meta name="author" content="React Capstone" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://react-startup-project.vercel.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://react-startup-project.vercel.app"
    />
    <meta property="og:title" content="React Capstone" />
    <meta
      property="og:description"
      content="A modern React application built with Vite, TailwindCSS, and best practices."
    />
    <meta
      property="og:image"
      content="https://react-startup-project.vercel.app/og-image.webp"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="React Capstone" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@your_twitter_handle" />
    <meta name="twitter:title" content="React Capstone" />
    <meta
      name="twitter:description"
      content="A modern React application built with Vite, TailwindCSS, and best practices."
    />
    <meta
      name="twitter:image"
      content="https://react-startup-project.vercel.app/og-image.webp"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/index.jsx"></script>
  </body>
</html>
